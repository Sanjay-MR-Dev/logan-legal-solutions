<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a66"/>
      <stop offset="100%" style="stop-color:#0f2040"/>
    </linearGradient>
    <linearGradient id="suit" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a4a7a"/>
      <stop offset="100%" style="stop-color:#162d52"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- shoulders / suit -->
  <ellipse cx="200" cy="380" rx="160" ry="80" fill="url(#suit)"/>
  <path d="M80 400 L80 280 Q80 220 200 200 Q320 220 320 280 L320 400 Z" fill="url(#suit)"/>
  <!-- shirt -->
  <path d="M170 200 L200 260 L230 200 Q200 190 170 200 Z" fill="#e8e0d4"/>
  <!-- tie -->
  <path d="M195 200 L200 290 L205 200 Z" fill="#c49a3c"/>
  <!-- neck -->
  <rect x="185" y="175" width="30" height="30" rx="8" fill="#c9a882"/>
  <!-- head -->
  <ellipse cx="200" cy="140" rx="72" ry="80" fill="#c9a882"/>
  <!-- hair -->
  <ellipse cx="200" cy="95" rx="74" ry="45" fill="#2c1810"/>
  <ellipse cx="200" cy="130" rx="72" ry="30" fill="#2c1810"/>
  <!-- subtle highlight -->
  <ellipse cx="175" cy="125" rx="12" ry="8" fill="rgba(255,255,255,0.08)"/>
</svg>
